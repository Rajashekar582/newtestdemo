plugins {
	id 'java'
	//code quality plugins
    id "checkstyle"
    id "pmd"
    id "jacoco"
	id "com.github.spotbugs" version "6.0.14"


	//formatting
	id "com.diffplug.spotless" version "6.21.0"

	// SonarQube Scanner
	id("org.sonarqube") version "7.2.2.6593"

	// OpenAPI Generator
	id("org.openapi.generator") version "7.10.0"

	//security
	id "org.owasp.dependencycheck" version "12.2.0"


	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'

}


//apply from: 'gradle/artifactory.gradle'
apply plugin: 'org.sonarqube'
//-----------------OWASP Dependency Check----------------------
dependencyCheck {
	failBuildOnCVSS = 7
	formats = ['HTML', 'JSON']
	nvd {
		apiKey = System.getenv('NVD_API_KEY') ?: 'your-api-key-here'
		validForHours = 24
	}
}

//--soptBugs--------------------
spotbugs {
	toolVersion = "4.8.5"
	ignoreFailures = false
	showProgress = true
}

tasks.withType(com.github.spotbugs.snom.SpotBugsTask) {
	reports {
		html.required = true
		xml.required = false
	}
}
//-----------------
//-------------checkstyle----------------
checkstyle {
	toolVersion = "10.13.0"  // latest stable
	configDirectory = file("config/checkstyle")
	showViolations = true
}

tasks.withType(Checkstyle) {
	reports {
		xml.required = true
		html.required = true
	}
}
//------------------
//---------------PMD----------------------
pmd {
	toolVersion = "6.55.0"  // latest stable
	ruleSets = []           // disable default rules
	ruleSetFiles = files("config/pmd/ruleset.xml")
}

tasks.withType(Pmd) {
	reports {
		xml.required = true
		html.required = true
	}
}
//-------------------
//-----------------jacoco----------------------
jacoco {
	toolVersion = "0.8.12"
}

jacocoTestReport {
	dependsOn test // tests are required to run first
	reports {
		xml.required = true
		csv.required = false
		html.required = true
	}
}
